<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Commerce | Register</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .reg-box {
      background: #111;
      width: 360px;
      padding: 32px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid #222;
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.25);
      animation: fadeIn .6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reg-box h2 {
      margin-bottom: 18px;
      color: #d4af37;
      font-weight: 600;
      font-size: 26px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #444;
      font-size: 16px;
      background: #1b1b1b;
      color: white;
      outline: none;
    }

    input:focus {
      border: 1px solid #d4af37;
      box-shadow: 0 0 6px rgba(212, 175, 55, 0.6);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border-radius: 8px;
      border: none;
      font-size: 17px;
      color: black;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #f4d87a;
    }

    a {
      margin-top: 14px;
      display: block;
      font-size: 14px;
      color: #aaa;
      text-decoration: none;
    }

    a span {
      color: #d4af37;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="reg-box">
    <h2>Create Account ✨</h2>

    <input id="username" placeholder="Enter Username" />
    <input id="password" type="password" placeholder="Enter Password" />

    <!-- IMPORTANT -->
    <button type="button" onclick="registerUser()">Register</button>

    <a href="login.html">
      Already have an account? <span>Login</span>
    </a>
  </div>

  <!-- ONLY JS FILE -->
  <script src="js/register.js"></script>
</body>
</html>
